name: Backup to Google Drive

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          token = ${{ secrets.GDRIVE_TOKEN }}
          root_folder_id = 1LxdBM01phS4BbYylBCCbgI-HcYOHhWJJ
          EOF

      - name: Sync repo to Google Drive
        run: |
          rclone sync . gdrive:${{ github.event.repository.name }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude "*.md" \
            --drive-skip-gdocs \
            -v