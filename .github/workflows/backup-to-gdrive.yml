name: Backup to Google Drive

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        uses: AnimMouse/setup-rclone@v1

      - name: Configure rclone
        env:
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive\ntoken = %s\nroot_folder_id = 1LxdBM01phS4BbYylBCCbgI-HcYOHhWJJ\n' "$GDRIVE_TOKEN" > ~/.config/rclone/rclone.conf

      - name: Copy repo to Google Drive
        run: |
          rclone copy . gdrive:${{ github.event.repository.name }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude "*.md" \
            --drive-skip-gdocs \
            -v