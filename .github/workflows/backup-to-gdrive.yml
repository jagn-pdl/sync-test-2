name: Backup to Google Drive

on:
  push:
    branches:
      - main

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << RCLONE
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          root_folder_id = 1LxdBM01phS4BbYylBCCbgI-HcYOHhWJJ
          RCLONE
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > /tmp/sa.json

      - name: Sync repo to Google Drive
        run: |
          rclone sync . gdrive:${{ github.event.repository.name }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            -v
