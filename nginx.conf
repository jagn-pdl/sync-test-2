worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/html;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Cache-control: no-cache for index.html so SPA always gets fresh shell
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Immutable cache for hashed assets (vite output: /assets/*.js, *.css)
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Proxy /api/ → backend:8000/ (strip /api prefix)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # SPA fallback: all other routes → index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
